name: "yarn integration"

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string

env:
  NODE: "22"
  FRONTEND_MONOREPO_DIR: "web"

jobs:
  build-editor:
    name: "Build editor"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: hmarr/debug-action@v3.0.0

      - name: Configure git
        shell: bash
        run: |
          set -xeuo pipefail
          git config --global user.name 'robot-ci-heartex'
          git config --global user.email 'robot-ci-heartex@users.noreply.github.com'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment
        with:
          node-version: "${{ env.NODE }}"
          directory: "${{ env.FRONTEND_MONOREPO_DIR }}"

      # Nx cache must be restored/saved in the workflow (not in the action) so we save
      # after the build runs. "integration" in key avoids collision with tests-yarn-lsf.
      # Increment CACHE_VERSION to force a one-time miss if cache was corrupted.
      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/.nx/cache
          key: nx-v2-integration-${{ runner.os }}-${{ env.NODE }}-${{ hashFiles('web/package.json', 'web/yarn.lock') }}
          restore-keys: |
            nx-v2-integration-${{ runner.os }}-${{ env.NODE }}-

      - name: Build editor (production)
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: MODE=standalone yarn nx run editor:build:production

      - name: Upload editor build
        uses: actions/upload-artifact@v4
        with:
          name: editor-build
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/dist/libs/editor

  cypress:
    name: "Cypress"
    needs: build-editor
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: hmarr/debug-action@v3.0.0

      - name: Configure git
        shell: bash
        run: |
          set -xeuo pipefail
          git config --global user.name 'robot-ci-heartex'
          git config --global user.email 'robot-ci-heartex@users.noreply.github.com'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment
        with:
          node-version: "${{ env.NODE }}"
          directory: "${{ env.FRONTEND_MONOREPO_DIR }}"

      - name: Cache Cypress binary
        uses: actions/cache@v4
        id: cypress-binary
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('web/yarn.lock') }}

      - name: Install Cypress binary
        if: steps.cypress-binary.outputs.cache-hit != 'true'
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: npx cypress install

      - name: Download editor build
        uses: actions/download-artifact@v4
        with:
          name: editor-build
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/dist/libs/editor

      - name: Run server
        id: run-server
        timeout-minutes: 1
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: |
          set -xeuo pipefail
          npx serve dist/libs/editor -l 3000 &
          pid=$!
          echo "pid=${pid}" >> $GITHUB_OUTPUT
          while ! curl -s -o /dev/null -L "http://localhost:3000"; do
            echo "=> Waiting for service to become available"
            sleep 2s
          done

      - name: Run Cypress
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: COLLECT_COVERAGE=1 npx nx run editor:integration

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cypress-coverage
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/coverage

      - name: Upload test results and screenshots
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cypress-output
          path: |
            ${{ env.FRONTEND_MONOREPO_DIR }}/dist/cypress/libs/frontend-test/src/screenshots
            ${{ env.FRONTEND_MONOREPO_DIR }}/dist/cypress/libs/frontend-test/src/videos

      - name: Upload coverage to Codecov
        if: ${{ always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v5
        with:
          name: lsf-integration
          flags: lsf-integration
          files: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/.nyc_output/out.json
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false

      - name: Kill server
        if: always()
        continue-on-error: true
        run: kill -9 "${{ steps.run-server.outputs.pid }}" 2>/dev/null || true
