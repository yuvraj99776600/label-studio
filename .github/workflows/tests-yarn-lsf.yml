# Single workflow: build the editor once (production standalone), then run both
# Cypress integration tests and CodeceptJS e2e tests against the same server build.
name: "yarn integration + e2e (LSF)"

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string

env:
  NODE: "22"
  FRONTEND_MONOREPO_DIR: "web"

jobs:
  build-editor:
    name: "Build editor"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: hmarr/debug-action@v3.0.0

      - name: Configure git
        shell: bash
        run: |
          set -xeuo pipefail
          git config --global user.name 'robot-ci-heartex'
          git config --global user.email 'robot-ci-heartex@users.noreply.github.com'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment
        with:
          node-version: "${{ env.NODE }}"
          directory: "${{ env.FRONTEND_MONOREPO_DIR }}"

      - name: Build editor (production)
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: MODE=standalone yarn nx run editor:build:production

      - name: Upload editor build
        uses: actions/upload-artifact@v4
        with:
          name: editor-build
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/dist/libs/editor

  cypress:
    name: "Cypress"
    needs: build-editor
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: hmarr/debug-action@v3.0.0

      - name: Configure git
        shell: bash
        run: |
          set -xeuo pipefail
          git config --global user.name 'robot-ci-heartex'
          git config --global user.email 'robot-ci-heartex@users.noreply.github.com'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment
        with:
          node-version: "${{ env.NODE }}"
          directory: "${{ env.FRONTEND_MONOREPO_DIR }}"

      - name: Download editor build
        uses: actions/download-artifact@v4
        with:
          name: editor-build
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/dist/libs/editor

      - name: Verify build contains assets and CSS
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: |
          set -e
          echo "Build output:"
          ls -la dist/libs/editor/
          test -f dist/libs/editor/index.html || (echo "Missing index.html" && exit 1)
          # Ensure CSS is present (webpack emits main.css or similar)
          if ! find dist/libs/editor -maxdepth 1 -name "*.css" -print -quit | grep -q .; then
            echo "No CSS file in build - styles may not load. Contents:"
            ls dist/libs/editor/
            exit 1
          fi
          echo "Build contains index.html and CSS assets."

      - name: Run server
        id: run-server
        timeout-minutes: 1
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: |
          set -xeuo pipefail
          npx serve dist/libs/editor -l 3000 &
          pid=$!
          echo "pid=${pid}" >> $GITHUB_OUTPUT
          while ! curl -s -o /dev/null -L "http://localhost:3000"; do
            echo "=> Waiting for service to become available"
            sleep 2s
          done
          # Verify root and that CSS is served (same origin as page)
          code=$(curl -s -o /dev/null -w "%{http_code}" -L "http://localhost:3000/")
          test "$code" = "200" || (echo "Root URL returned $code" && exit 1)
          css_ref=$(curl -s -L "http://localhost:3000/" | grep -oE 'href="[^"]+\.css[^"]*"' | head -1 | cut -d'"' -f2)
          if [ -n "$css_ref" ]; then
            css_url="http://localhost:3000/${css_ref#/}"
            css_code=$(curl -s -o /dev/null -w "%{http_code}" -L "$css_url")
            test "$css_code" = "200" || (echo "CSS URL $css_url returned $css_code" && exit 1)
            echo "Root and CSS are served correctly."
          fi

      - name: Run Cypress
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: COLLECT_COVERAGE=1 npx nx run editor:integration

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cypress-coverage
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/coverage

      - name: Upload test results and screenshots
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cypress-output
          path: |
            ${{ env.FRONTEND_MONOREPO_DIR }}/dist/cypress/libs/frontend-test/src/screenshots
            ${{ env.FRONTEND_MONOREPO_DIR }}/dist/cypress/libs/frontend-test/src/videos

      - name: Upload coverage to Codecov
        if: ${{ always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v5
        with:
          name: lsf-integration
          flags: lsf-integration
          files: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/.nyc_output/out.json
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false

      - name: Kill server
        if: always()
        continue-on-error: true
        run: kill -9 "${{ steps.run-server.outputs.pid }}" 2>/dev/null || true

  e2e:
    name: "yarn e2e"
    needs: build-editor
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: hmarr/debug-action@v3.0.0

      - name: Configure git
        shell: bash
        run: |
          set -xeuo pipefail
          git config --global user.name 'robot-ci-heartex'
          git config --global user.email 'robot-ci-heartex@users.noreply.github.com'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment
        with:
          node-version: "${{ env.NODE }}"
          directory: "${{ env.FRONTEND_MONOREPO_DIR }}"

      - name: Download editor build
        uses: actions/download-artifact@v4
        with:
          name: editor-build
          path: ${{ env.FRONTEND_MONOREPO_DIR }}/dist/libs/editor

      - name: Install e2e dependencies
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/tests/e2e
        run: yarn install

      - name: Install Playwright browsers
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}/libs/editor/tests/e2e
        run: yarn playwright install --with-deps

      - name: Run server
        id: run-server
        timeout-minutes: 1
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        run: |
          set -xeuo pipefail
          npx serve dist/libs/editor -l 3000 &
          pid=$!
          echo "pid=${pid}" >> $GITHUB_OUTPUT
          while ! curl -s -o /dev/null -L "http://localhost:3000"; do
            echo "=> Waiting for service to become available"
            sleep 2s
          done

      - name: Run tests
        working-directory: ${{ env.FRONTEND_MONOREPO_DIR }}
        env:
          HEADLESS: true
          COVERAGE: true
        run: yarn lsf:e2e:ci

      - name: Upload coverage to Codecov
        if: ${{ always() && github.event.pull_request.head.repo.fork == false && github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v5
        with:
          name: lsf-e2e
          flags: lsf-e2e
          directory: web/libs/editor/tests/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: true

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: e2e output
          path: |
            web/libs/editor/tests/e2e/output
            web/libs/editor/tests/coverage

      - name: Kill server
        if: always()
        continue-on-error: true
        run: kill -9 "${{ steps.run-server.outputs.pid }}" 2>/dev/null || true
